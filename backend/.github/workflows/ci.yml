name: CI

on:
  push:
    branches: [main, develop, refactor]
  pull_request:
    branches: [main]

env:
  CONVEX_DEPLOYMENT: ${{ vars.CONVEX_DEPLOYMENT || 'dev:placeholder' }}
  CONVEX_URL: ${{ vars.CONVEX_URL || 'https://placeholder.convex.cloud' }}
  JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret' }}

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - working-directory: backend
        run: |
          npm ci
          npx convex codegen
      - name: TypeScript check
        working-directory: backend
        run: npx tsc --noEmit --project convex/tsconfig.json
        continue-on-error: true

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - working-directory: backend
        run: npm ci
      - name: Run unit tests
        working-directory: backend
        run: npx vitest run tests/unit --reporter=verbose
        env:
          JWT_SECRET: test-secret
      - name: Run integration tests
        working-directory: backend
        run: npx vitest run tests/integration --reporter=verbose
        env:
          JWT_SECRET: test-secret
      - name: Run E2E tests
        working-directory: backend
        run: npx vitest run tests/e2e --reporter=verbose
        env:
          JWT_SECRET: test-secret

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        working-directory: backend
        run: docker build -t resqbridge-backend .
